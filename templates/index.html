<!DOCTYPE html>
<html>
<head>
    <title>SafePath</title>
</head>
<body>
    <h1>SafePath</h1>

    <p>Compare safer and faster travel routes before you go.</p>

    <form action="/route" method="POST">
        <label for="start_location">Starting Location:</label><br>
        <input type="text" id="start_location" name="start_location" placeholder="Example: Kennesaw State University" required>

        <br><br>

        <label for="destination">Destination:</label><br>
        <input type="text" id="destination" name="destination" placeholder="Example: Atlanta, GA" required>

        <br><br>

        <button type="submit">Compare Routes</button>
    </form>
</body>
</html>
